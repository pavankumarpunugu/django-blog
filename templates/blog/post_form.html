{% extends 'blog/base.html' %}
{% block title %}{{ action }} Post - PavanBlog{% endblock %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card p-4">
                <h4 class="fw-bold mb-4">
                    <i class="fas fa-pen me-2 text-primary"></i>{{ action }} Post
                </h4>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Title</label>
                        {{ form.title }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Category</label>
                        {{ form.category }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Excerpt <small class="text-muted">(Short description)</small></label>
                        {{ form.excerpt }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Content</label>
                        {{ form.content }}
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Status</label>
                        {{ form.status }}
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i>{{ action }} Post
                        </button>
                        <a href="{% url 'home' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
