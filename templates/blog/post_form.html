{% extends 'blog/base.html' %}
{% block title %}{{ action }} Post - PavanBlog{% endblock %}
{% block content %}
<div class="fc wide fu">
    <h2>{{ action }} Post</h2>
    <span class="sub">Share your thoughts with the world</span>
    <form method="post">
        {% csrf_token %}
        <div class="fg"><label class="fl">Title</label>{{ form.title }}</div>
        <div class="fg"><label class="fl">Category</label>{{ form.category }}</div>
        <div class="fg"><label class="fl">Excerpt</label>{{ form.excerpt }}</div>
        <div class="fg"><label class="fl">Content</label>{{ form.content }}</div>
        <div class="fg"><label class="fl">Status</label>{{ form.status }}</div>
        <div class="df g2 mt2">
            <button type="submit" class="btn bg"><i class="fas fa-save"></i> {{ action }} Post</button>
            <a href="{% url 'home' %}" class="btn bo">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
