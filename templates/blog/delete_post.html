{% extends 'blog/base.html' %}
{% block title %}Delete Post - PavanBlog{% endblock %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4 text-center">
                <i class="fas fa-trash-alt fa-4x text-danger mb-3"></i>
                <h4 class="fw-bold">Delete Post?</h4>
                <p class="text-muted">Are you sure you want to delete <strong>"{{ post.title }}"</strong>? This cannot be undone.</p>
                <form method="post" class="d-flex gap-2 justify-content-center mt-3">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
                    <a href="{% url 'post_detail' post.slug %}" class="btn btn-outline-secondary px-4">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
