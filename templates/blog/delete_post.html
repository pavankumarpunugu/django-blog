{% extends 'blog/base.html' %}
{% block title %}Delete Post{% endblock %}
{% block content %}
<div class="fc" style="text-align:center">
    <i class="fas fa-trash-alt" style="font-size:3rem;color:var(--red);margin-bottom:1rem;display:block"></i>
    <h2>Delete Post?</h2>
    <span class="sub">Are you sure you want to delete "<strong style="color:var(--text)">{{ post.title }}</strong>"?</span>
    <form method="post" class="df g2 mt2" style="justify-content:center">
        {% csrf_token %}
        <button type="submit" class="btn br">Yes, Delete</button>
        <a href="{% url 'post_detail' post.slug %}" class="btn bo">Cancel</a>
    </form>
</div>
{% endblock %}
