{% extends 'blog/base.html' %}
{% block title %}Login - PavanBlog{% endblock %}
{% block content %}
<div class="fc fu">
    <div style="text-align:center;margin-bottom:2rem">
        <i class="fas fa-pen-fancy" style="font-size:2rem;color:var(--accent);margin-bottom:1rem;display:block"></i>
        <h2>Welcome Back</h2>
        <span class="sub">Login to continue writing</span>
    </div>
    <form method="post">
        {% csrf_token %}
        <div class="fg"><label class="fl">Username</label><input type="text" name="username" placeholder="Your username" autofocus></div>
        <div class="fg"><label class="fl">Password</label><input type="password" name="password" placeholder="Your password"></div>
        <button type="submit" class="btn bg" style="width:100%;justify-content:center;margin-top:.5rem"><i class="fas fa-sign-in-alt"></i> Login</button>
    </form>
    <p class="tm mt2" style="text-align:center">Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
</div>
{% endblock %}
